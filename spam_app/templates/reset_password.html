{% extends "base.html" %}

{% block auth_content %}
<div
    class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 backdrop-blur-sm bg-opacity-90">
    <div class="text-center mb-8">
        <h2
            class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary-600 to-indigo-600 dark:from-primary-400 dark:to-indigo-400">
            Reset Password
        </h2>
        <p class="text-gray-500 dark:text-gray-400 mt-2">Please enter your new secure password below.</p>
    </div>

    <form method="POST" class="space-y-6">
        <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">New
                Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="••••••••"
                class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-xl p-3 focus:ring-2 focus:ring-primary-500 outline-none transition duration-200">
        </div>
        <button type="submit"
            class="w-full bg-gradient-to-r from-primary-600 to-indigo-600 hover:from-primary-700 hover:to-indigo-700 text-white font-bold py-3 rounded-xl transition transform hover:scale-[1.02] shadow-lg shadow-primary-500/25">
            Update Password
        </button>
    </form>
</div>
{% endblock %}
